<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Congrats Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --bg: #000000; --white: #ffffff; --gray: #888888; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--white);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #step-congrats {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            overflow: hidden;
        }

        .congrats-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
            position: relative;
        }

        .congrats-badge {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            margin-bottom: 1.8rem;
            opacity: 0;
            transform: scale(0);
            box-shadow: 0 0 0 0 rgba(255,215,0,0), 0 0 60px rgba(255,215,0,0);
        }

        .congrats-badge.animate {
            animation: badgePop 0.7s cubic-bezier(0.16,1,0.3,1) forwards,
                       badgeGlow 2s ease-in-out 0.7s infinite alternate;
        }

        @keyframes badgePop {
            0% { opacity: 0; transform: scale(0) rotate(-30deg); }
            60% { transform: scale(1.15) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        @keyframes badgeGlow {
            0% { box-shadow: 0 0 20px rgba(255,215,0,0.3), 0 0 60px rgba(255,215,0,0.1); }
            100% { box-shadow: 0 0 40px rgba(255,215,0,0.5), 0 0 100px rgba(255,215,0,0.2); }
        }

        .congrats-youre-in {
            font-size: clamp(0.7rem, 1.2vw, 0.85rem);
            font-weight: 600;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: #ffd700;
            margin-bottom: 0.5rem;
            opacity: 0;
            transform: translateY(15px);
        }

        .congrats-heading {
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            font-weight: 900;
            margin-bottom: 0.8rem;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, #ffffff 0%, #ffd700 50%, #ffffff 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            transform: translateY(20px);
        }

        .congrats-heading.animate {
            animation: shimmerText 3s linear infinite;
        }

        @keyframes shimmerText {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }

        .congrats-subtext {
            font-size: clamp(0.85rem, 1.5vw, 1.05rem);
            color: rgba(255,255,255,0.6);
            text-align: center;
            max-width: 360px;
            line-height: 1.7;
            letter-spacing: 0.01em;
            opacity: 0;
            transform: translateY(15px);
        }

        .congrats-divider {
            width: 60px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,215,0,0.5), transparent);
            margin: 1.8rem 0;
            opacity: 0;
        }

        .congrats-slot {
            padding: 1.2rem 2.5rem;
            border: 1px solid rgba(255,215,0,0.25);
            text-align: center;
            position: relative;
            opacity: 0;
            transform: translateY(15px);
        }

        .congrats-slot::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,215,0,0.05), transparent);
        }

        .congrats-slot-label {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,215,0,0.7);
            margin-bottom: 0.4rem;
        }

        .congrats-slot-number {
            font-size: 2.5rem;
            font-weight: 200;
            font-variant-numeric: tabular-nums;
            color: var(--white);
        }

        .congrats-elite {
            margin-top: 1.5rem;
            font-size: clamp(0.7rem, 1.1vw, 0.8rem);
            color: rgba(255,255,255,0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
            opacity: 0;
            transform: translateY(10px);
        }

        #confetti {
            position: fixed;
            inset: 0;
            z-index: 3;
            pointer-events: none;
        }

        .ring-burst {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 2px solid rgba(255,215,0,0.4);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
        }

        .ring-burst.animate {
            animation: ringExpand 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
        }

        .ring-burst:nth-child(2) { animation-delay: 0.15s; border-color: rgba(255,215,0,0.2); }
        .ring-burst:nth-child(3) { animation-delay: 0.3s; border-color: rgba(255,255,255,0.15); }

        @keyframes ringExpand {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(4); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="step-congrats">
        <div class="ring-burst"></div>
        <div class="ring-burst"></div>
        <div class="ring-burst"></div>
        <canvas id="confetti"></canvas>
        <div class="congrats-content">
            <div class="congrats-badge" id="congrats-badge"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4l3 12h14l3-12-6 5-4-7-4 7-6-5z"/><path d="M5 16h14v2H5z"/></svg></div>
            <div class="congrats-youre-in" id="congrats-youre-in">You're in</div>
            <div class="congrats-heading" id="congrats-heading">Congratulations</div>
            <div class="congrats-subtext" id="congrats-subtext">Your exclusive spot has been reserved. We'll alert you when registration opens, and you'll have <strong style="color:#ffd700;">48 hours</strong> to claim your spot.</div>
            <div class="congrats-divider" id="congrats-divider"></div>
            <div class="congrats-slot" id="congrats-slot">
                <div class="congrats-slot-label">Your whitelist position</div>
                <div class="congrats-slot-number" id="slot-number">#—</div>
            </div>
            <div class="congrats-elite" id="congrats-elite">Welcome to the inner circle</div>
        </div>
    </div>

    <script>
        function launchCongrats() {
            const confettiCanvas = document.getElementById('confetti');
            const cCtx = confettiCanvas.getContext('2d');
            confettiCanvas.width = window.innerWidth;
            confettiCanvas.height = window.innerHeight;

            const confettiPieces = [];
            const colors = ['#ffd700','#ffaa00','#ff6b6b','#ffffff','#6bffb8','#6bb5ff','#ff6bff','#ffd700'];

            for (let i = 0; i < 150; i++) {
                confettiPieces.push({
                    x: confettiCanvas.width / 2 + (Math.random() - 0.5) * 100,
                    y: confettiCanvas.height / 2,
                    vx: (Math.random() - 0.5) * 18,
                    vy: -Math.random() * 22 - 5,
                    w: Math.random() * 10 + 4,
                    h: Math.random() * 6 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotSpeed: (Math.random() - 0.5) * 15,
                    gravity: 0.35 + Math.random() * 0.15,
                    opacity: 1,
                    decay: 0.002 + Math.random() * 0.003
                });
            }

            function drawConfetti() {
                cCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
                let alive = false;
                for (const c of confettiPieces) {
                    if (c.opacity <= 0) continue;
                    alive = true;
                    c.vy += c.gravity;
                    c.vx *= 0.99;
                    c.x += c.vx;
                    c.y += c.vy;
                    c.rotation += c.rotSpeed;
                    if (c.y > confettiCanvas.height * 0.7) c.opacity -= c.decay * 3;
                    cCtx.save();
                    cCtx.translate(c.x, c.y);
                    cCtx.rotate(c.rotation * Math.PI / 180);
                    cCtx.globalAlpha = Math.max(0, c.opacity);
                    cCtx.fillStyle = c.color;
                    cCtx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
                    cCtx.restore();
                }
                if (alive) requestAnimationFrame(drawConfetti);
            }
            drawConfetti();

            const badge = document.getElementById('congrats-badge');
            const youreIn = document.getElementById('congrats-youre-in');
            const heading = document.getElementById('congrats-heading');
            const subtext = document.getElementById('congrats-subtext');
            const divider = document.getElementById('congrats-divider');
            const slot = document.getElementById('congrats-slot');
            const elite = document.getElementById('congrats-elite');
            const rings = document.querySelectorAll('.ring-burst');

            rings.forEach(r => r.classList.add('animate'));
            setTimeout(() => badge.classList.add('animate'), 200);

            const reveal = (el, delay) => {
                setTimeout(() => {
                    el.style.transition = 'opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1)';
                    el.style.opacity = '1';
                    el.style.transform = 'translateY(0)';
                    if (el === heading) el.classList.add('animate');
                }, delay);
            };

            reveal(youreIn, 500);
            reveal(heading, 700);
            reveal(subtext, 1000);

            setTimeout(() => {
                divider.style.transition = 'opacity 0.8s ease, width 0.8s ease';
                divider.style.opacity = '1';
                divider.style.width = '60px';
            }, 1200);

            reveal(slot, 1400);

            setTimeout(() => {
                const target = 1183;
                const slotEl = document.getElementById('slot-number');
                let current = 0;
                const step = Math.max(1, Math.floor(target / 40));
                const interval = setInterval(() => {
                    current += step;
                    if (current >= target) {
                        current = target;
                        clearInterval(interval);
                    }
                    slotEl.textContent = `#${current.toLocaleString()}`;
                }, 30);
            }, 1500);

            reveal(elite, 1900);

            setTimeout(() => {
                for (let i = 0; i < 80; i++) {
                    confettiPieces.push({
                        x: Math.random() * confettiCanvas.width,
                        y: -20,
                        vx: (Math.random() - 0.5) * 6,
                        vy: Math.random() * 4 + 2,
                        w: Math.random() * 8 + 3,
                        h: Math.random() * 5 + 2,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        rotation: Math.random() * 360,
                        rotSpeed: (Math.random() - 0.5) * 10,
                        gravity: 0.2 + Math.random() * 0.1,
                        opacity: 1,
                        decay: 0.003
                    });
                }
                drawConfetti();
            }, 1200);
        }

        // Auto-launch on page load
        setTimeout(launchCongrats, 300);
    </script>
</body>
</html>
