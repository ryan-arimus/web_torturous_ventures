<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SRU Picks - Match Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ececee;
      min-height: 100vh;
      overflow: hidden;
      font-family: "Avenir Next", "Segoe UI", sans-serif;
      color: #2f2f35;
    }

    .stage {
      width: min(100vw, calc(100vh * 9 / 16));
      height: min(100vh, calc(100vw * 16 / 9));
      margin: 0 auto;
      position: relative;
      background: #ececee;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }

    .hud {
      position: fixed;
      left: 14px;
      bottom: 14px;
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    button, a {
      border: 1px solid #cdced3;
      border-radius: 999px;
      background: rgba(247, 247, 250, 0.92);
      color: #3d3e45;
      font: 600 12px/1 "Avenir Next", "Segoe UI", sans-serif;
      letter-spacing: 0.02em;
      padding: 8px 12px;
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(4px);
    }
  </style>
</head>
<body>
  <div id="stage" class="stage"></div>
  <div class="hud">
    <button id="replay" type="button">Replay</button>
    <a href="/assets/srupicks_1.mp4" target="_blank" rel="noopener noreferrer">Open Reference</a>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "/node_modules/three/build/three.module.js",
      "three/addons/": "/node_modules/three/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { FontLoader } from "three/addons/loaders/FontLoader.js";
    import { TextGeometry } from "three/addons/geometries/TextGeometry.js";

    const stage = document.getElementById("stage");
    const replay = document.getElementById("replay");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xececee);

    const camera = new THREE.PerspectiveCamera(24, 9 / 16, 0.1, 160);
    camera.position.set(0, -1.45, 26.5);
    camera.lookAt(0, -1.5, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    stage.appendChild(renderer.domElement);

    const hemi = new THREE.HemisphereLight(0xffffff, 0xdbdce0, 0.72);
    scene.add(hemi);

    const key = new THREE.DirectionalLight(0xffffff, 1.1);
    key.position.set(-7, 11, 8);
    key.castShadow = true;
    key.shadow.mapSize.set(2048, 2048);
    key.shadow.camera.left = -10;
    key.shadow.camera.right = 10;
    key.shadow.camera.top = 10;
    key.shadow.camera.bottom = -10;
    key.shadow.camera.near = 0.5;
    key.shadow.camera.far = 60;
    scene.add(key);

    const fill = new THREE.DirectionalLight(0xffffff, 0.28);
    fill.position.set(6, 6, 6);
    scene.add(fill);

    const ground = new THREE.Mesh(
      new THREE.PlaneGeometry(80, 80),
      new THREE.ShadowMaterial({ opacity: 0.22 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -3.28;
    ground.receiveShadow = true;
    scene.add(ground);

    const textMat = new THREE.MeshStandardMaterial({
      color: 0xf2f2f4,
      roughness: 0.35,
      metalness: 0.0
    });

    let sruGroup;
    let picksGroup;
    let startTime = 0;

    function sampleCurve(points, t) {
      if (t <= points[0][0]) return points[0][1];
      for (let i = 0; i < points.length - 1; i++) {
        const [t0, v0] = points[i];
        const [t1, v1] = points[i + 1];
        if (t <= t1) {
          const a = (t - t0) / (t1 - t0);
          const s = a * a * (3 - 2 * a);
          return THREE.MathUtils.lerp(v0, v1, s);
        }
      }
      return points[points.length - 1][1];
    }

    const sruYKeys = [
      [0.00, 16.0],
      [0.20, 12.0],
      [0.60, 7.8],
      [1.00, 2.5],
      [1.40, -1.95],
      [1.80, -0.20],
      [2.20, -1.05],
      [2.60, -1.95],
      [3.00, -1.55],
      [3.40, -1.05],
      [3.80, -0.45],
      [4.20, -1.00],
      [4.40, -1.18],
      [4.80, -0.92],
      [5.05, -1.00]
    ];

    const picksYKeys = [
      [0.00, -9.7],
      [3.70, -9.7],
      [3.84, -3.95],
      [4.00, -2.95],
      [4.20, -2.17],
      [4.40, -2.02],
      [4.60, -2.24],
      [4.80, -2.72],
      [5.05, -3.10]
    ];

    const sruRotKeys = [
      [0.00, 0.28],
      [1.00, 0.08],
      [1.60, 0.00],
      [5.05, 0.00]
    ];

    function setup(font) {
      sruGroup = new THREE.Group();
      const sruGeo = new TextGeometry("SRU", {
        font,
        size: 3.80,
        depth: 1.05,
        curveSegments: 14,
        bevelEnabled: true,
        bevelThickness: 0.03,
        bevelSize: 0.02,
        bevelSegments: 2
      });
      sruGeo.computeBoundingBox();
      const sruW = sruGeo.boundingBox.max.x - sruGeo.boundingBox.min.x;
      const sru = new THREE.Mesh(sruGeo, textMat);
      sru.castShadow = true;
      sru.position.x = -sruW / 2;
      sruGroup.add(sru);
      scene.add(sruGroup);

      picksGroup = new THREE.Group();
      const picksGeo = new TextGeometry("picks", {
        font,
        size: 1.84,
        depth: 0.84,
        curveSegments: 14,
        bevelEnabled: true,
        bevelThickness: 0.025,
        bevelSize: 0.018,
        bevelSegments: 2
      });
      picksGeo.computeBoundingBox();
      const picksW = picksGeo.boundingBox.max.x - picksGeo.boundingBox.min.x;
      const picks = new THREE.Mesh(picksGeo, textMat);
      picks.castShadow = true;
      picks.position.x = -picksW / 2 + 0.03;
      picksGroup.add(picks);
      scene.add(picksGroup);

      startTime = performance.now();
    }

    const loader = new FontLoader();
    loader.load("/node_modules/three/examples/fonts/droid/droid_sans_bold.typeface.json", setup);

    replay.addEventListener("click", () => {
      startTime = performance.now();
    });

    function resize() {
      const w = stage.clientWidth;
      const h = stage.clientHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }

    window.addEventListener("resize", resize);
    resize();

    function animate(now) {
      requestAnimationFrame(animate);

      if (sruGroup && picksGroup && startTime) {
        let t = (now - startTime) / 1000;
        t = t % 5.05;

        sruGroup.position.y = sampleCurve(sruYKeys, t);
        sruGroup.rotation.x = sampleCurve(sruRotKeys, t);

        picksGroup.position.y = sampleCurve(picksYKeys, t);
        picksGroup.position.z = 0.03;

        camera.lookAt(0, -1.65, 0);
      }

      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
